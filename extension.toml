id = "defold-kit-zed"
name = "Defold Kit (Zed)"
description = "Defold API and native extension annotations injected into the Lua language server."
version = "0.1.0"
schema_version = 1
authors = ["Salavat Rakhmanov <s.rahmanov@hgpoint.com>"]
repository = "https://github.com/salavatrakhmanov/defold-kit-zed"
snippets = ["./snippets/lua.json"]

[language_servers.defold-lua-ls]
name = "Defold Kit (config-only)"
languages = ["Defold Script"]

[[capabilities]]
kind = "process:exec"
command = "find"
args = ["**"]

[[capabilities]]
kind = "process:exec"
command = "unzip"
args = ["**"]

[[capabilities]]
kind = "process:exec"
command = "cat"
args = ["**"]
